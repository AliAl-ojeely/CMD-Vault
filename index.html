<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <title>CMD Vault</title>

    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https: local-resource:;">

    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
</head>

<body>

    <!-- ========== LANDING PAGE ========== -->
    <div id="landing-page">
        <div class="landing-content">
            <img src="assets/icon.png" alt="CMD Vault Logo" class="landing-logo" />
            <h1 class="landing-title" data-i18n="appTitle">CMD Vault</h1>
            <p class="landing-subtitle" data-i18n="landing_subtitle">Select your operating system, Git, Flutter, Node.js to browse its commands
            </p>
            <div class="os-selection">
                <button class="os-card" data-os="windows">
                    <i class="fab fa-windows fa-4x"></i>
                    <span data-i18n="os_windows">Windows</span>
                </button>
                <button class="os-card" data-os="linux">
                    <i class="fab fa-linux fa-4x"></i>
                    <span data-i18n="os_linux">Linux</span>
                </button>
                <button class="os-card" data-os="macos">
                    <i class="fab fa-apple fa-4x"></i>
                    <span data-i18n="os_macos">macOS</span>
                </button>
                <button class="os-card" data-os="ai">
                    <i class="fa-solid fa-brain fa-4x"></i>
                    <span data-i18n="os_ai">AI Prompts</span>
                </button>
                <button class="os-card" data-os="git">
                    <i class="fa-brands fa-git-alt fa-4x" style="color: #f14e32;"></i>
                    <span data-i18n="os_git">Git</span>
                </button>
                <button class="os-card" data-os="flutter">
                    <i class="fa-solid fa-mobile-screen fa-4x" style="color: #54C5F8;"></i>
                    <span data-i18n="os_flutter">Flutter</span>
                </button>
                <button class="os-card" data-os="nodejs">
                    <i class="fa-brands fa-node-js fa-4x" style="color: #5FA04E;"></i>
                    <span data-i18n="os_nodejs">Node.js</span>
                </button>
            </div>
        </div>
    </div>

    <!-- ========== LINUX DISTRO SELECTION (hidden initially) ========== -->
    <div id="linux-distro-page"
        style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%); z-index: 8000; align-items: center; justify-content: center;">
        <div class="landing-content">
            <h2 style="color: var(--accent); margin-bottom: 2rem;" data-i18n="select_linux_distro">Select your Linux
                Distribution</h2>
            <div class="os-selection">
                <button class="os-card" data-distro="debian">
                    <i class="fab fa-ubuntu fa-4x"></i>
                    <span>Debian / Ubuntu</span>
                </button>
                <button class="os-card" data-distro="redhat">
                    <i class="fab fa-redhat fa-4x"></i>
                    <span>Red Hat / Fedora</span>
                </button>
                <button class="os-card" data-distro="arch">
                    <i class="fab fa-linux fa-4x"></i>
                    <span>Arch / Manjaro</span>
                </button>
            </div>
            <button id="back-from-distro" class="back-btn" style="margin-top: 2rem;">
                <i class="fas fa-arrow-left"></i> <span data-i18n="back">Back</span>
            </button>
        </div>
    </div>

    <!-- ========== MAIN APP (hidden initially) ========== -->
    <div id="app-main" style="display: none;">

        <!-- Unified Sidebar -->
        <aside id="sidebar">
            <div id="sidebar-header" class="clickable-dev-trigger">
                <img src="assets/icon.png" alt="CMD Vault Logo" class="sidebar-logo animate-logo" />
                <h2 id="app-title" class="animate-title" data-i18n="appTitle">CMD Vault</h2>
            </div>

            <div id="sidebar-controls">
                <button id="back-to-landing" class="back-btn">
                    <i class="fas fa-arrow-left"></i> <span class="back-label" data-i18n="changeOS">Change OS</span>
                </button>
                <div id="lang-switch">
                    <!-- Language toggles can be re‑enabled later if desired -->
                </div>
            </div>

            <div id="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="search-input" placeholder="Search commands..."
                    data-i18n-placeholder="searchPlaceholder" />
            </div>

            <button id="settings-back-btn" style="display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;
                           background: var(--bg-card); border: 1px solid var(--border-color);
                           color: var(--text-secondary); padding: 0.4rem 1rem; border-radius: 4px;
                           cursor: pointer;">
                <i class="fas fa-arrow-left"></i> <span data-i18n="back_to_commands">Commands</span>
            </button>

            <button id="theme-toggle-btn" class="theme-toggle-btn" title="Switch Theme">
                <i id="theme-icon" class="fas fa-moon"></i>
            </button>
            <br>

            <nav id="categories-list"></nav>
            <!-- Settings button is now generated dynamically here -->
        </aside>

        <!-- Main Content Area -->
        <section id="content">
            <!-- Commands view -->
            <div id="commands-view">
                <div id="commands-container"></div>
            </div>

            <!-- Settings view (hidden by default) -->
            <div id="settings-view" style="display: none;">
                <div class="settings-container">
                    <h2><i class="fa-solid fa-sliders"></i> <span data-i18n="title_settings">Settings</span></h2>

                    <div class="form-group">
                        <label data-i18n="set_lang">Language:</label>
                        <select id="langSetting" class="custom-select">
                            <option value="ar">العربية</option>
                            <option value="en">English</option>
                        </select>
                    </div>

                    <!-- Window Size Settings -->
                    <div class="form-group">
                        <label data-i18n="window_size_title">Window Size (Manual)</label>
                        <div class="settings-grid" style="grid-template-columns: 1fr 1fr; gap: 10px;">
                            <div class="form-group" style="margin-bottom: 0;">
                                <label data-i18n="window_width">Width (px):</label>
                                <input type="number" id="windowWidthInput" class="custom-input" min="800" step="10"
                                    value="1200">
                            </div>
                            <div class="form-group" style="margin-bottom: 0;">
                                <label data-i18n="window_height">Height (px):</label>
                                <input type="number" id="windowHeightInput" class="custom-input" min="600" step="10"
                                    value="800">
                            </div>
                        </div>
                    </div>

                    <!-- Update Check -->
                    <div class="form-group">
                        <label data-i18n="check_updates_title">Application Updates</label>
                        <button id="checkForUpdatesBtn" class="folder-btn-blue">
                            <i class="fa-solid fa-arrows-rotate"></i>
                            <span data-i18n="btn_check_updates">Check for Updates</span>
                        </button>
                        <p id="update-result" style="color: var(--text-secondary); margin-top: 0.5rem; display: none;">
                        </p>
                    </div>

                    <button class="save-settings-btn" id="saveGeneralSettings">
                        <i class="fa-solid fa-floppy-disk"></i>
                        <span data-i18n="btn_save_settings">Save Settings</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- Warning/Info Modal Overlay -->
        <div id="modal-overlay" class="hidden">
            <div class="modal">
                <h2 id="modal-title" data-i18n="warningTitle">OS Warning</h2>
                <p id="modal-message"></p>
                <button id="modal-close" data-i18n="close">Close</button>
            </div>
        </div>

        <!-- Dev Modal Overlay -->
        <div class="modal-overlay" id="devModal" style="display: none;">
            <div class="modal-content"
                style="text-align: center; display: flex; flex-direction: column; align-items: center;">
                <i class="fa-solid fa-ghost" style="font-size: 60px; color: var(--accent); margin-bottom: 20px;"></i>
                <h2 data-i18n="dev_title">Developer Info</h2>
                <div
                    style="margin: 25px 0; line-height: 1.8; width: 100%; display: flex; flex-direction: column; align-items: center;">
                    <h3 style="margin: 0; color: var(--text-main); text-align: center; width: 100%;">Ali Al-ojeely
                        (Mr.Ghost)</h3>
                    <p style="color: var(--text-muted); margin: 5px 0; text-align: center;">alialojeely@gmail.com</p>
                    <p style="text-align: center;">
                        <span id="github-profile-link"
                            style="color: var(--accent); text-decoration: underline; font-weight: bold; cursor: pointer;"
                            data-i18n="github_profile">GitHub Profile</span>
                    </p>
                    <p style="text-align: center;" data-i18n="version_label">version 2.5.0</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script> -->
    <script src="src/translations.js"></script>
    <script type="module" src="render/render-main.js"></script>
</body>

</html>
